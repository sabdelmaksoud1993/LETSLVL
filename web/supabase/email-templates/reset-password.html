<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Your Password — LET'S LVL</title>
</head>
<body style="margin:0;padding:0;background-color:#0A0A0A;font-family:Arial,Helvetica,sans-serif;color:#FFFFFF;-webkit-font-smoothing:antialiased;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0A0A0A;">
  <tr>
    <td align="center" style="padding:24px 16px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- Header -->
        <tr>
          <td align="center" style="padding:0 0 24px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#000000;border-radius:12px 12px 0 0;">
              <tr>
                <td align="center" style="padding:24px;">
                  <span style="font-size:28px;font-weight:800;letter-spacing:4px;color:#F5C518;text-transform:uppercase;">LET'S LVL</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:0 0 24px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#141414;border-radius:12px;">
              <tr>
                <td style="padding:32px 24px;">
                  <h1 style="margin:0 0 4px;font-size:24px;font-weight:700;color:#F5C518;text-transform:uppercase;letter-spacing:2px;">
                    Reset Your Password
                  </h1>
                  <p style="margin:0 0 24px;font-size:14px;color:#9CA3AF;line-height:1.5;">
                    We received a request to reset your password. Click the button below to choose a new one.
                  </p>

                  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px auto 0;">
                    <tr>
                      <td align="center" style="background-color:#F5C518;border-radius:8px;">
                        <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:14px;font-weight:700;color:#000000;text-decoration:none;text-transform:uppercase;letter-spacing:2px;">
                          Reset Password
                        </a>
                      </td>
                    </tr>
                  </table>

                  <p style="margin:24px 0 0;font-size:12px;color:#9CA3AF;line-height:1.5;">
                    This link expires in 60 minutes. If you didn't request a password reset, you can safely ignore this email.
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding:16px 0 0;">
            <p style="margin:0 0 8px;font-size:13px;color:#9CA3AF;line-height:1.5;">Built in Dubai. Shaped by culture.</p>
            <p style="margin:0;font-size:12px;color:#9CA3AF;line-height:1.5;">
              <a href="https://letslvl.com" style="color:#F5C518;text-decoration:none;">letslvl.com</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
